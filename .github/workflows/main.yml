name: Publish Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: '2026/i_love_buses'
    - name: Create a Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release create "i_love_buses-${{ github.sha }}" --target ${{ github.sha }} --title "i_love_buses" --notes ""
